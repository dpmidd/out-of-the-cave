- id: first_law
  conditions:
    tier: 2
    blocked_by_milestones: [first_law]
  text: >
    A dispute over sleeping spots escalates into a brawl. One man claims
    the flattest ground near the fire. Another says he gathered the wood
    and deserves it. A third simply shoves them both aside. {npc} pulls
    you in: "Plato, if you are to lead us, then lead. Make a rule.
    Any rule. Before someone dies over a patch of dirt."
  choices:
    - text: "Establish the first law: shared resources belong to all. No one claims more than their share."
      skill_check: rhetoric
      difficulty: 4
      outcomes:
        success:
          text: >
            The crowd listens. It is not perfect — some mutter about who
            defines a 'share' — but the fighting stops. For the first time,
            an idea holds more power than a fist. You have planted the seed
            of a social contract.
          effects:
            stability: 0.05
            chaos: -0.05
            law: "Shared resources belong to all equally"
          history_flag: conflict_resolved
        failure:
          text: >
            Your proposed law is met with scorn. "Easy for the philosopher
            to preach sharing," someone snaps. The fighting resumes. You
            have revealed the gap between ideas and authority.
          effects:
            chaos: 0.1
    - text: "Appoint the strongest as an enforcer. Order through power."
      skill_check: authority
      difficulty: 5
      chaos_delta: 0.1
      outcomes:
        success:
          text: >
            The enforcer separates the brawlers. Peace returns — the peace
            of submission. It is not the republic you imagined, but it
            functions. For now.
          effects:
            stability: 0.03
            law: "The enforcer keeps peace by strength"
          assign_role: enforcer
        failure:
          text: >
            The appointed enforcer turns the role to his own advantage,
            claiming the best spot for himself. You have created a tyrant
            in miniature.
          effects:
            chaos: 0.15
            loyalty_all: -0.08
    - text: "Let them fight. The strong will sort it out."
      skill_check: courage
      difficulty: 3
      outcomes:
        success:
          text: >
            The brawl burns itself out. A rough hierarchy emerges — not
            just, but stable. Sometimes order grows from the ground up.
          effects:
            stability: 0.02
        failure:
          text: >
            The fight worsens. Someone pulls a sharpened stick. Blood
            is drawn. The first wound of your new society.
          effects:
            population: -1
            chaos: 0.12
    - text: "Retreat to the cave."
      special: retreat

- id: scouting_party
  conditions:
    tier: 2
    required_milestones: [fire]
    blocked_by_milestones: [explored]
  text: >
    From the hilltop, you can see farther than anyone in the group has ever
    looked. Rolling green land stretches to the south. A dark line of forest
    sits to the west. To the east, what might be smoke — or mist — rises
    above a distant ridge. {npc} stands beside you. "We cannot stay in this
    one spot forever. Someone should go look."
  choices:
    - text: "Go yourself. A leader should know the land he asks others to settle."
      skill_check: courage
      difficulty: 5
      outcomes:
        success:
          text: >
            You return after a day's walk with knowledge that changes everything:
            a fertile valley to the south, a clay deposit by the river, and signs
            of wild goats on the hillside. The land is generous — if you know
            where to look.
          effects:
            food: 3
            stability: 0.03
            knowledge: 1
          history_flag: explored
        failure:
          text: >
            You get turned around in the forest. Night falls before you find
            your way back. The camp panicked in your absence — someone had to
            take charge, and they resented having to.
          effects:
            chaos: 0.1
            loyalty_all: -0.03
    - text: "Send the sharpest-eyed person you have. You're needed here."
      skill_check: wisdom
      difficulty: 3
      outcomes:
        success:
          text: >
            Your scout returns with a rough map scratched into bark. There is
            a valley, a river, a ridge with a view for miles. Possibilities
            unfold. The group feels less like refugees and more like settlers.
          effects:
            stability: 0.03
            knowledge: 1
          history_flag: explored
          assign_role: scout
        failure:
          text: >
            The scout returns with little useful information — they were too
            afraid to venture far. The unknown remains unknown.
          effects:
            chaos: 0.04
    - text: "We stay put. There's enough to deal with here."
      outcomes:
        success:
          text: >
            The group focuses inward. There is comfort in the familiar camp,
            even if it is cramped. But the horizon will wait only so long.
          effects:
            stability: 0.01
    - text: "Retreat to the cave."
      special: retreat

- id: who_speaks_for_us
  conditions:
    tier: 2
    required_milestones: [first_law]
  text: >
    The first law was a beginning. But now disputes arise daily — who
    hunts, who guards, who tends the fire while others sleep. {npc}
    calls an informal gathering. "One person cannot decide everything.
    We need voices. People who represent the rest of us." The crowd
    murmurs agreement. They are looking at you to structure this.
  choices:
    - text: "Appoint a council of three. Choose the wisest among them."
      skill_check: wisdom
      difficulty: 4
      outcomes:
        success:
          text: >
            You select three: one respected for labor, one for speech,
            one for courage. It is a crude senate, but they meet each
            morning and the decisions they make carry weight. You have
            created representation.
          effects:
            stability: 0.04
            chaos: -0.04
          assign_role: council_member
        failure:
          text: >
            Your choices are questioned. "Why them? Why not me?" The
            council forms but is immediately undermined by jealousy.
          effects:
            chaos: 0.08
            loyalty_all: -0.04
    - text: "Let the people choose their own representatives. A vote."
      skill_check: rhetoric
      difficulty: 5
      outcomes:
        success:
          text: >
            The concept of voting is alien to them, but you explain it
            simply: each person speaks a name, and the names spoken most
            become the voices of all. It is messy, loud, beautiful. Democracy
            in its most fragile infancy.
          effects:
            stability: 0.05
            chaos: -0.05
            law: "Leaders are chosen by the voices of the people"
          assign_role: council_member
        failure:
          text: >
            The vote devolves into a popularity contest. The loudest
            voices win, not the wisest. The "council" is a clique.
          effects:
            stability: 0.01
            chaos: 0.06
          assign_role: council_member
    - text: "You are the voice. A philosopher-king needs no council."
      skill_check: authority
      difficulty: 6
      chaos_delta: 0.15
      outcomes:
        success:
          text: >
            The crowd accepts it — for now. You hold absolute authority.
            The decisions come faster, the order is clearer. But something
            is lost. They follow out of obedience, not belief.
          effects:
            stability: 0.03
            loyalty_all: -0.08
        failure:
          text: >
            "Who made you king?" someone shouts. The crowd shifts. You
            have overplayed your hand, and the resentment is palpable.
          effects:
            chaos: 0.2
            loyalty_all: -0.12
    - text: "Retreat to the cave."
      special: retreat

- id: building_together
  conditions:
    tier: 2
    required_milestones: [fire]
    blocked_by_milestones: [agora]
  text: >
    The lean-tos are failing. Wind tears through gaps, rain soaks the
    sleeping mats. {npc} has been studying how the trees grow — thick
    trunks, broad leaves — and proposes a plan: "If we work together,
    really together, we could build something that lasts. Not a lean-to.
    A structure."
  choices:
    - text: "Organize a building effort. Everyone contributes."
      skill_check: pragmatism
      difficulty: 4
      outcomes:
        success:
          text: >
            It takes three days. Blisters, arguments, a collapsed wall that
            has to be rebuilt. But when it is done, a rough longhouse stands
            at the center of camp. It is ugly and imperfect and it is theirs.
            People sleep dry for the first time.
          effects:
            shelter: 3
            stability: 0.04
            chaos: -0.04
        failure:
          text: >
            The effort collapses mid-construction. A wall falls and injures
            two people. Morale sinks. Some say the gods don't want them
            building here.
          effects:
            shelter: 1
            chaos: 0.08
            population: -1
    - text: "Assign roles: cutters, carriers, builders. Specialize the labor."
      skill_check: authority
      difficulty: 4
      outcomes:
        success:
          text: >
            The division of labor works. People discover they are good at
            things they never knew existed — shaping wood, mixing clay,
            weaving roof thatch. Shelter rises, and with it, identity.
          effects:
            shelter: 2
            stability: 0.03
          assign_role: builder
        failure:
          text: >
            The rigid roles chafe. People assigned to carrying resent those
            who get to build. The structure is half-finished and no one
            wants to complete it.
          effects:
            shelter: 1
            chaos: 0.06
            loyalty_all: -0.03
    - text: "Retreat to the cave."
      special: retreat

- id: the_skeptic
  conditions:
    tier: 2
    turn_min: 3
  text: >
    A voice emerges from the group — quiet at first, then sharper. "This is
    the same as before. We huddle, we follow, we pretend it is better. But
    we are still in the dark, still afraid." {npc} looks at you. "Why should
    we believe you? Why should we believe any of this is not just a new cave,
    smaller and colder?"
  choices:
    - text: "Answer with rhetoric: paint a vision of what this becomes."
      skill_check: rhetoric
      difficulty: 5
      outcomes:
        success:
          text: >
            Your words are measured, vivid. You speak not of certainty but of
            work — something solid enough to hold onto. The skeptic listens,
            nods slowly. Not convinced, but willing. That is enough.
          effects:
            stability: 0.03
          history_flag: skeptic_answered
        failure:
          text: >
            Your words ring hollow even to you. The skeptic smiles — a small,
            sad expression. "See? Even you don't believe it." The mood darkens.
          effects:
            chaos: 0.12
            loyalty_all: -0.04
    - text: "Answer with wisdom: acknowledge the fear is real."
      skill_check: wisdom
      difficulty: 4
      outcomes:
        success:
          text: >
            You speak slowly, honestly. "Yes. Yes, it feels like a smaller
            cave. But we have each other now, not the stone. And that is the
            beginning of something." The skeptic's shoulders relax.
          effects:
            stability: 0.04
          history_flag: skeptic_answered
        failure:
          text: >
            Your attempt at honesty sounds like condescension. The skeptic
            hardens. Others begin to murmur agreement with them.
          effects:
            chaos: 0.1
    - text: "Answer pragmatically: point out those who have benefited."
      skill_check: pragmatism
      difficulty: 3
      outcomes:
        success:
          text: >
            You name specific examples — the shelter, the food stores, the
            healings. Tangible things. The skeptic cannot argue with lived
            experience. They settle back, still skeptical but quieter.
          effects:
            stability: 0.02
          history_flag: skeptic_answered
        failure:
          text: >
            You cite examples, but cherry-pick them. The skeptic catches you.
            "So you have to hide the failures to make it sound good?" Trust erodes.
          effects:
            chaos: 0.08
    - text: "Retreat to the cave."
      special: retreat

- id: the_naming
  conditions:
    tier: 2
    turn_min: 4
    required_milestones: [first_law]
  text: >
    The settlement has no name. It is still "the camp," "the place," "here."
    But it is growing — more permanent, more intentional. {npc} raises the
    question at the evening fire: "If we are going to stay, if this is truly
    ours, then it needs a name. Something that says what we are."
  choices:
    - text: "Name it yourself, invoking authority."
      skill_check: rhetoric
      difficulty: 3
      outcomes:
        success:
          text: >
            You stand and speak a name — brief, resonant, something that
            captures the defiance and the hope. People repeat it. It sticks.
            By morning, they are already using it. An identity is born.
          effects:
            stability: 0.04
            knowledge: 1
          history_flag: named_settlement
        failure:
          text: >
            The name you choose sounds forced, pretentious. People smile and
            forget it by morning. Identity cannot be imposed.
          effects:
            knowledge: 1
    - text: "Let the settlement name itself through debate."
      skill_check: wisdom
      difficulty: 4
      outcomes:
        success:
          text: >
            You facilitate the discussion. Voices clash, laughter breaks out,
            finally consensus forms around a name no single person proposed.
            It belongs to everyone equally. That matters.
          effects:
            stability: 0.05
            knowledge: 1
          history_flag: named_settlement
        failure:
          text: >
            The debate never settles. Too many voices, too many visions.
            People get frustrated and drift away. No name emerges, only fatigue.
          effects:
            stability: -0.02
    - text: "Retreat to the cave."
      special: retreat

- id: the_boundary
  conditions:
    tier: 2
    turn_min: 5
    required_milestones: [first_law]
    chaos_delta: 0.1
  text: >
    Someone planted seeds yesterday. Today, someone else dug them up and took
    them. "Those were mine," one says. "Everything here is ours," the other
    counters. {npc} looks at you: "We have laws for words and duty. Do we have
    a law for this? What is mine? What is ours?"
  choices:
    - text: "Establish property rights through rhetoric and persuasion."
      skill_check: rhetoric
      difficulty: 5
      outcomes:
        success:
          text: >
            You craft a law: "Each person may hold what they labor to build."
            It is simple, comprehensible, grounded in effort. The dispute
            resolves. Property is real, now, and it is lawful.
          effects:
            law: "Each person may hold what they labor to build"
            stability: 0.03
          history_flag: property_defined
        failure:
          text: >
            Your attempt to mediate pleases no one. Both parties feel cheated.
            The resentment hardens. Someone else steals in retaliation.
          effects:
            chaos: 0.08
    - text: "Decide through authority: declare the law yourself."
      skill_check: authority
      difficulty: 6
      outcomes:
        success:
          text: >
            You declare the law with authority and enforce it immediately.
            The settlement accepts it, partly from respect, partly from fear.
            Property is established, though resentment smolders.
          effects:
            law: "Each person may hold what they labor to build"
            stability: 0.02
            loyalty_all: -0.05
          history_flag: property_defined
        failure:
          text: >
            You attempt to impose authority, but the settlement is not yet
            ready to be ruled. They resist, argue, and the law fails to take
            root. Chaos increases.
          effects:
            chaos: 0.15
    - text: "Propose a compromise with wisdom: some things are personal, some communal."
      skill_check: wisdom
      difficulty: 4
      outcomes:
        success:
          text: >
            You frame it clearly: certain tools, certain shelters are personal;
            food stores and building materials remain communal. The distinction
            is honored. Property is partial, but it is clear.
          effects:
            law: "Each person may hold what they labor to build"
            stability: 0.04
          history_flag: property_defined
        failure:
          text: >
            The distinction is too subtle. People squabble over which things are
            which. The law sows more confusion than clarity.
          effects:
            chaos: 0.06
    - text: "Retreat to the cave."
      special: retreat

- id: the_mourning
  conditions:
    tier: 2
    turn_min: 6
    blocked_by_milestones: [council]
  text: >
    {npc} is gone. An illness, fast and brutal. The settlement has no rite for
    death — only the shock of absence. Someone asks: "What do we do? How do we
    honor them? How do we say goodbye to someone we just learned the name of?"
  choices:
    - text: "Organize a ritual — gather, speak, remember."
      skill_check: rhetoric
      difficulty: 4
      outcomes:
        success:
          text: >
            You gather everyone. People speak of the dead — small stories, kind
            words. You find language for grief and respect. When it is done,
            people feel less lost. Death has been acknowledged. It has weight.
          effects:
            knowledge: 1
            stability: 0.03
            population: -1
          history_flag: death_ritual
        failure:
          text: >
            The ritual feels forced, awkward, even false. People disperse early.
            The death goes unprocessed. Grief lingers, unresolved.
          effects:
            chaos: 0.06
            population: -1
    - text: "Treat it practically — wash the body, commit it to earth, move forward."
      skill_check: pragmatism
      difficulty: 3
      outcomes:
        success:
          text: >
            You organize the burial swiftly and with dignity. The body is
            honored, the settlement is spared prolonged anguish. Life resumes.
          effects:
            population: -1
            stability: 0.02
          history_flag: death_ritual
        failure:
          text: >
            The hurried approach feels disrespectful. Someone protests loudly.
            The burial becomes a source of shame rather than closure.
          effects:
            population: -1
            chaos: 0.08
    - text: "Retreat to the cave."
      special: retreat

- id: the_hoarder
  conditions:
    tier: 2
    turn_min: 7
    chaos_min: 0.12
  text: >
    Someone is hiding food. It was discovered in a pit beneath their sleeping
    area — enough for weeks, stripped from the shared stores during night
    hours. {npc} brings the evidence to you: "What do we do? Do they fear us?
    Do they think we will starve them?"
  choices:
    - text: "Confront with authority: theft is betrayal, enforce swift punishment."
      skill_check: authority
      difficulty: 5
      outcomes:
        success:
          text: >
            You confront the hoarder publicly. They confess fear — fear of
            famine, fear of being left behind. You enforce a punishment: they
            surrender the hoard and work extra labor. Order is restored, if brittle.
          effects:
            chaos: -0.06
            food: -2
          assign_role: enforcer
        failure:
          text: >
            The hoarder denies everything, claims they are framed. Others begin
            to suspect each other. Trust fractures along invisible lines.
          effects:
            chaos: 0.1
    - text: "Show mercy with wisdom: understand the fear beneath the theft."
      skill_check: wisdom
      difficulty: 4
      outcomes:
        success:
          text: >
            You speak privately with the hoarder, listen. Fear of starvation,
            trauma from before. You include them in food planning, give them
            responsibility and security. They empty the pit willingly. Trust
            deepens.
          effects:
            stability: 0.03
            food: 1
        failure:
          text: >
            Your mercy is misread as weakness. The hoarder hides more food.
            Others start to wonder if they should too.
          effects:
            chaos: 0.12
    - text: "Retreat to the cave."
      special: retreat

- id: the_messenger
  conditions:
    tier: 2
    turn_min: 8
    required_milestones: [explored]
  text: >
    A stranger emerges from the woods — thin, scarred, speaking a dialect you
    barely understand. They claim to come from the south, where "many people
    live together under a single sky, in great stone buildings." {npc} looks
    skeptical: "Are they telling the truth, or are they mad?"
  choices:
    - text: "Question them with wisdom about their origin."
      skill_check: wisdom
      difficulty: 4
      outcomes:
        success:
          text: >
            You ask careful questions. Their answers are consistent, detailed,
            specific. The stories align. This civilization, however strange,
            is real. People lived before you, built before you, thought before
            you. The weight of that settles on everyone.
          effects:
            knowledge: 2
          history_flag: prior_civilization_found
        failure:
          text: >
            You press them, and the stories contradict. Either they are lying
            or they are mad. Either way, the settlement remains alone in a dark
            world.
          effects:
            knowledge: -1
    - text: "Challenge them to prove it — ask for trade or signs of their people."
      skill_check: courage
      difficulty: 5
      outcomes:
        success:
          text: >
            They produce objects from their satchel — tools of a design you
            have never seen, cloth woven in patterns beyond your skill. The
            proof is real. Trade goods are exchanged. A door opens to the world.
          effects:
            knowledge: 2
            food: 3
          history_flag: prior_civilization_found
        failure:
          text: >
            They have little to trade, or what they offer is clearly stolen.
            The skepticism deepens. You show them away with suspicion.
          effects:
            knowledge: 1
    - text: "Listen with rhetoric: share your own story and invite theirs."
      skill_check: rhetoric
      difficulty: 3
      outcomes:
        success:
          text: >
            You speak of your own journey — the cave, the fire, the slow climb
            outward. They respond with tears, with recognition. Two isolated
            peoples touch, briefly. Knowledge passes in both directions.
          effects:
            knowledge: 2
            stability: 0.03
          history_flag: prior_civilization_found
        failure:
          text: >
            The stranger grows defensive, returns to broken speech, and leaves
            in the night. The moment passes. You are alone again.
          effects:
            knowledge: 1
    - text: "Retreat to the cave."
      special: retreat
