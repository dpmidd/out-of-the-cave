- id: the_teaching
  conditions:
    tier: 3
    turn_min: 7
    required_milestones: [council]
    blocked_by_milestones: [education]
  text: >
    A child approaches you one evening and asks why the sky changes color.
    You begin to explain — and realize every adult has stopped to listen.
    They have never been taught anything. The cave offered only echoes.
    {npc} says quietly, "Could you teach us more?"
  choices:
    - text: "Begin regular lessons. Geometry in the dirt. Names for the stars."
      skill_check: wisdom
      difficulty: 5
      outcomes:
        success:
          text: >
            The lessons become ritual. Each evening, a circle forms.
            You draw shapes and name constellations. An old woman learns
            to count past twenty. A young man asks what justice means.
            Something is kindling that hunger cannot extinguish.
          effects:
            knowledge: 2
            stability: 0.03
        failure:
          text: >
            The lessons bore them. People drift away after the first
            few evenings. "Philosophy does not fill stomachs," {npc}
            says, not unkindly.
          effects:
            knowledge: 1
            chaos: 0.04
    - text: "Teach only the council. Knowledge is power — distribute it carefully."
      skill_check: authority
      difficulty: 6
      outcomes:
        success:
          text: >
            The council absorbs your teachings. They begin to reason,
            to debate, to question. But the others watch the closed
            meetings with suspicion. A class divide is forming.
          effects:
            knowledge: 2
            stability: 0.02
            chaos: 0.05
        failure:
          text: >
            The council members are insulted. "We are equals here, not
            your students." The attempt at selective education backfires.
          effects:
            chaos: 0.08
            loyalty_all: -0.05
    - text: "Let knowledge come naturally. People learn when they need to."
      outcomes:
        success:
          text: >
            Time passes. People learn by doing — which herbs heal, which
            wood burns longest, which soil grows food. Practical wisdom,
            not philosophy. But wisdom nonetheless.
          effects:
            knowledge: 1
            stability: 0.01
    - text: "Retreat to the cave."
      special: retreat

- id: the_murder
  conditions:
    tier: 3
    turn_min: 8
    required_milestones: [first_law]
    chaos_min: 0.1
    min_population: 8
  text: >
    A body is found at dawn. {npc} lies still beside the granary, a
    dark bruise across the temple. The food stores have been raided.
    Accusations fly instantly — the ambitious, the hungry, the outsider.
    There is no evidence. Only rage and grief. Your people look to you
    with murder in their eyes and ask for justice you have not yet
    invented.
  choices:
    - text: "Call a trial. Let the council hear testimony and decide."
      skill_check: rhetoric
      difficulty: 7
      outcomes:
        success:
          text: >
            The trial is agonizing. Three days of accusations. But the
            process itself becomes the point. Evidence is weighed. A
            verdict is reached — exile, not death. The people have chosen
            reason over vengeance. It costs them dearly, but something
            sacred has been built.
          effects:
            stability: 0.04
            chaos: -0.05
            population: -1
            law: "Trial by council"
          history_flag: conflict_resolved
        failure:
          text: >
            The trial dissolves into a shouting match. The accused flees
            into the night. Half the settlement believes you sheltered
            a killer. Trust fractures along lines that may never heal.
          effects:
            chaos: 0.15
            stability: -0.05
            loyalty_all: -0.08
    - text: "Execute the most likely suspect. Swift justice prevents chaos."
      skill_check: authority
      difficulty: 6
      chaos_delta: 0.1
      outcomes:
        success:
          text: >
            The execution is quick. The settlement falls silent — not
            with peace, but with fear. Order is restored through terror.
            No one steals again. No one speaks freely again either.
          effects:
            population: -1
            stability: 0.02
            loyalty_all: -0.12
            law: "Theft is punished by death"
        failure:
          text: >
            The execution is botched and public. People vomit, scream,
            turn away. You have shown them something worse than the
            cave's shadows. Two families leave in the night.
          effects:
            population: -3
            chaos: 0.2
            loyalty_all: -0.15
    - text: "Investigate yourself. Spend days searching for the truth."
      skill_check: courage
      difficulty: 6
      outcomes:
        success:
          text: >
            You find the stolen food hidden beneath a lean-to. The thief
            confesses — they were feeding a sick child in secret. The
            settlement must decide: mercy or law. Either way, they are
            thinking about justice for the first time.
          effects:
            knowledge: 1
            stability: 0.03
            food: 2
          history_flag: conflict_resolved
        failure:
          text: >
            Your investigation turns up nothing. Days wasted while the
            settlement stews in suspicion. Everyone suspects everyone.
            The social fabric tears at invisible seams.
          effects:
            chaos: 0.12
            stability: -0.04
    - text: "Retreat to the cave."
      special: retreat

- id: the_drought
  conditions:
    tier: 3
    turn_min: 8
    required_milestones: [sustenance]
  text: >
    The stream slows to a trickle, then stops. The earth cracks. Plants
    wilt. The food stores shrink daily. {npc} reports that at this rate,
    you have three days before hunger becomes desperation. The land that
    welcomed you is showing its teeth.
  choices:
    - text: "Ration everything. Strict portions, no exceptions."
      skill_check: authority
      difficulty: 6
      outcomes:
        success:
          text: >
            Rationing holds. People are hungry but alive. The discipline
            is painful, but it proves that structure can bend without
            breaking. When the rain finally comes, the settlement has
            learned to endure.
          effects:
            food: -3
            stability: 0.03
            chaos: -0.02
        failure:
          text: >
            Rationing collapses on the second day. The strong take from
            the weak. A child goes hungry while a man eats double. Your
            system has exposed the cruelty it was meant to prevent.
          effects:
            food: -5
            chaos: 0.15
            stability: -0.06
    - text: "Send scouts far afield to find a new water source."
      skill_check: courage
      difficulty: 7
      outcomes:
        success:
          text: >
            The scouts return after two harrowing days with news of a
            spring beyond the ridge. The move is exhausting but the
            water is clear and abundant. Crisis averted — barely.
          effects:
            food: 4
            stability: 0.03
            knowledge: 1
        failure:
          text: >
            The scouts do not return for four days. When they do, one
            is injured and they found nothing. The settlement's morale
            breaks. Some speak openly of returning to the cave.
          effects:
            chaos: 0.12
            population: -1
    - text: "Pray to whatever gods the cave-dwellers remember."
      skill_check: rhetoric
      difficulty: 5
      outcomes:
        success:
          text: >
            You lead a ceremony — improvised, earnest, strange. The
            rain comes the next day. Coincidence, perhaps. But the
            people believe, and belief has power. A shared ritual
            binds them closer.
          effects:
            food: 2
            stability: 0.02
            knowledge: 1
        failure:
          text: >
            The prayers are met with silence. The sky stays clear and
            cruel. Some begin to doubt not just the gods, but you.
            "Even the heavens ignore the philosopher."
          effects:
            chaos: 0.08
            loyalty_all: -0.05
    - text: "Retreat to the cave."
      special: retreat

- id: the_ambitious_one
  conditions:
    tier: 3
    turn_min: 9
    required_milestones: [roles_assigned]
    min_population: 6
  text: >
    {npc} has been gathering supporters. They are charismatic, capable,
    and increasingly vocal about what they call your "failures." Tonight,
    they stand before the fire and announce: "I should be on the council.
    I have done more for this settlement than half the people you chose.
    Give me a role, or I will make my own."
  choices:
    - text: "Give them a role. Channel ambition into service."
      skill_check: wisdom
      difficulty: 5
      outcomes:
        success:
          text: >
            You appoint them to a meaningful role. Their energy, once
            corrosive, becomes productive. They organize a work crew
            that builds faster than any before. Ambition, properly
            directed, is a resource.
          effects:
            stability: 0.03
            shelter: 1
          assign_role: foreman
        failure:
          text: >
            The role only emboldens them. They begin countermanding your
            decisions, building a parallel authority. You have legitimized
            a rival.
          effects:
            chaos: 0.1
            loyalty_all: -0.04
    - text: "Refuse. Merit is earned, not demanded."
      skill_check: authority
      difficulty: 7
      outcomes:
        success:
          text: >
            Your refusal is firm and public. The ambitious one slinks
            away. The message is clear: power is not seized here.
            Some respect you more for it. Others fear you.
          effects:
            stability: 0.02
            chaos: -0.03
        failure:
          text: >
            Your refusal is seen as petty. "He fears competition," people
            whisper. The ambitious one leaves with five followers to
            start their own camp within sight of yours.
          effects:
            population: -5
            chaos: 0.15
            stability: -0.05
    - text: "Create a challenge. Let them prove themselves publicly."
      skill_check: pragmatism
      difficulty: 6
      outcomes:
        success:
          text: >
            The challenge — a hunt, a construction, a negotiation — draws
            a crowd. The ambitious one succeeds and earns their place
            honestly. Competition has become institution. You have
            invented meritocracy.
          effects:
            stability: 0.04
            knowledge: 1
            law: "Leadership is earned through demonstrated merit"
          assign_role: council_member
        failure:
          text: >
            The challenge goes wrong. The ambitious one is humiliated
            publicly and blames you for rigging it. The crowd is divided.
            What was meant to unify has deepened the fracture.
          effects:
            chaos: 0.12
            loyalty_all: -0.06
    - text: "Retreat to the cave."
      special: retreat

- id: the_sickness
  conditions:
    tier: 3
    turn_min: 10
    min_population: 6
  text: >
    It starts with a cough. Within three days, half the settlement is
    feverish. Children are worst affected. {npc} tends to the sick, but
    there is no medicine, no knowledge of herbs beyond trial and error.
    Death feels close. The settlement holds its breath.
  choices:
    - text: "Quarantine the sick. Isolation protects the healthy."
      skill_check: pragmatism
      difficulty: 6
      outcomes:
        success:
          text: >
            The quarantine holds. The sick recover slowly, tended by
            volunteers who risk their own health. Only one is lost.
            The settlement has learned that discipline saves lives.
          effects:
            population: -1
            stability: 0.03
            chaos: -0.03
            knowledge: 1
        failure:
          text: >
            The quarantine is resented. "You lock away the sick like
            animals!" Families break through to tend their own. The
            illness spreads further. More are lost.
          effects:
            population: -3
            chaos: 0.12
            stability: -0.05
    - text: "Venture into the forest yourself to find healing herbs."
      skill_check: courage
      difficulty: 7
      outcomes:
        success:
          text: >
            You return with armfuls of herbs — some effective, some
            useless, but your willingness to risk yourself changes
            how they see you. The fever breaks. You have become
            healer as well as philosopher.
          effects:
            population: -1
            stability: 0.04
            knowledge: 2
        failure:
          text: >
            The herbs you find are wrong. Two more die from the
            treatment itself. Your confidence is shaken. So is theirs.
          effects:
            population: -3
            chaos: 0.1
            loyalty_all: -0.06
    - text: "Delegate to whoever claims knowledge of healing."
      skill_check: wisdom
      difficulty: 5
      outcomes:
        success:
          text: >
            An old woman steps forward. She knows roots and bark from
            the cave's edges. Her remedies are crude but effective.
            She becomes the settlement's first healer — a role no
            philosopher thought to create.
          effects:
            population: -1
            stability: 0.02
          assign_role: healer
        failure:
          text: >
            The self-proclaimed healer's remedies do nothing. People
            lose faith in delegation itself. "No one knows anything
            out here," they mutter. The sick suffer on.
          effects:
            population: -2
            chaos: 0.08
    - text: "Retreat to the cave."
      special: retreat

- id: the_debate
  conditions:
    tier: 3
    turn_min: 10
    required_milestones: [council, first_law]
  text: >
    The council calls an open gathering. The question is simple but
    enormous: "What kind of society are we building?" {npc} argues for
    equality — all share equally, all decide equally. Another voice
    demands hierarchy — the skilled should lead, the strong should
    protect. A third wants only to be left alone. The fire crackles
    between them.
  choices:
    - text: "Moderate the debate. Guide them toward a middle path."
      skill_check: rhetoric
      difficulty: 6
      outcomes:
        success:
          text: >
            You speak of balance. Of the craftsman and the guardian, the
            farmer and the thinker. Each has a role; none is above the
            other. It is the Republic in embryo — imperfect, argued over,
            alive. The debate ends not in agreement, but in respect.
          effects:
            stability: 0.04
            knowledge: 2
            chaos: -0.04
        failure:
          text: >
            Your moderation is seen as weakness. "Pick a side!" someone
            shouts. The debate degenerates into faction. Three camps
            form where one society should stand.
          effects:
            chaos: 0.12
            stability: -0.04
    - text: "Let them argue. Democracy is messy — let it be messy."
      skill_check: wisdom
      difficulty: 5
      outcomes:
        success:
          text: >
            Hours pass. Voices rise and fall. Insults are thrown, then
            retracted. By dawn, exhaustion has forged a rough consensus:
            shared labor, earned leadership, protected freedom. It is
            ugly and human and it is theirs.
          effects:
            stability: 0.03
            knowledge: 1
            law: "All citizens may speak at the gathering"
        failure:
          text: >
            The argument never ends. It becomes a wound that reopens
            daily. Every decision is now contested. Every action is
            questioned. Paralysis sets in.
          effects:
            chaos: 0.1
            stability: -0.03
    - text: "Dictate the answer. You are the philosopher — you know what is just."
      skill_check: authority
      difficulty: 7
      chaos_delta: 0.1
      outcomes:
        success:
          text: >
            You speak for an hour. Of justice, of the soul, of the city
            that mirrors it. They listen — not because they agree, but
            because your vision is the only complete one. A structure
            emerges from your words. It will be tested, but it stands.
          effects:
            stability: 0.05
            knowledge: 2
            loyalty_all: -0.06
        failure:
          text: >
            "Tyrant," someone whispers. Then louder. The word spreads
            like fire. You have shown them exactly what they feared:
            a philosopher who believes his truth is the only truth.
          effects:
            chaos: 0.2
            stability: -0.08
            loyalty_all: -0.1
    - text: "Retreat to the cave."
      special: retreat

- id: the_healer_and_the_dying
  conditions:
    tier: 3
    turn_min: 10
    required_milestones: [sustenance]
  text: >
    {npc} is a healer — the best the settlement has. But they are facing
    something they cannot heal. Someone lies dying, slowly, painfully. The
    healer approaches you: "I can end their suffering with what I know. But
    is that my right? Is that justice?"
  choices:
    - text: "Authorize mercy with courage — support the healer's choice."
      skill_check: courage
      difficulty: 6
      outcomes:
        success:
          text: >
            You place your hand on the healer's shoulder: "Ending suffering
            is a form of healing. Your judgment is sound." They act. The dying
            person passes gently. The healer is relieved, not guilty.
          effects:
            population: -1
            knowledge: 1
            stability: 0.02
        failure:
          text: >
            Your support is unconvincing. The healer doubts, hesitates. The
            person's final hours are prolonged agony. The healer carries guilt.
          effects:
            population: -1
            chaos: 0.06
    - text: "Argue for life with wisdom — there is no such thing as terminal here."
      skill_check: wisdom
      difficulty: 5
      outcomes:
        success:
          text: >
            You speak to the healer about resilience, about miracles they have
            seen. You offer palliatives, presence, ritual. The dying person
            surprises everyone and recovers, slowly. Life persists.
          effects:
            knowledge: 1
            population: 1
            stability: 0.03
        failure:
          text: >
            The person dies anyway, prolonged and painful. Your insistence on
            hope becomes its own cruelty. The healer blames you for the suffering.
          effects:
            population: -2
            chaos: 0.08
    - text: "Leave it to the healer with pragmatism — this is their domain."
      skill_check: pragmatism
      difficulty: 6
      outcomes:
        success:
          text: >
            You step back. "You know this better than I do. I trust your judgment."
            Relieved of the burden of your approval or judgment, the healer makes
            a clear choice. The death is merciful.
          effects:
            population: -1
            knowledge: 2
        failure:
          text: >
            The healer freezes without your guidance. The person dies in confusion.
            The healer wonders what they should have done.
          effects:
            population: -1
            chaos: 0.05
    - text: "Retreat to the cave."
      special: retreat

- id: the_dissenting_council_member
  conditions:
    tier: 3
    turn_min: 11
    required_milestones: [council]
    chaos_delta: 0.1
  text: >
    One of your chosen council members has become a problem. They question
    every decision, block progress, speak openly about corruption. {npc}
    asks: "Are they keeping us honest? Or are they a wrench in the works?"
  choices:
    - text: "Remove them with authority — disagreement becomes obstruction."
      skill_check: authority
      difficulty: 7
      outcomes:
        success:
          text: >
            You strip their council seat in a public proceeding. The message
            is clear: loyalty is not optional. Others fall in line. The council
            becomes efficient but hollow.
          effects:
            stability: 0.03
            history_flag: council_purged
        failure:
          text: >
            The removal backfires. People rally around the dissident. You are
            suddenly the tyrant they feared. The council fractures.
          effects:
            chaos: 0.12
            stability: -0.03
    - text: "Embrace their critique with wisdom and reform the council."
      skill_check: wisdom
      difficulty: 7
      outcomes:
        success:
          text: >
            You meet the dissident privately, listen fully. You find truth in
            their words. You propose reforms: rotation, transparency, veto
            power for minorities. The council becomes stronger. The dissident
            becomes an ally.
          effects:
            stability: 0.04
            history_flag: council_reform
        failure:
          text: >
            You try to embrace their critique, but it goes too far. Other
            council members feel betrayed. The proposed reforms look like
            capitulation. Internal warfare begins.
          effects:
            chaos: 0.1
            stability: -0.02
    - text: "Use rhetoric to defend the council's good faith."
      skill_check: rhetoric
      difficulty: 6
      outcomes:
        success:
          text: >
            You speak publicly about why the council makes the decisions it does.
            You acknowledge the difficulty, the moral weight. The dissident is
            heard, but understood, not vindicated. Balance holds.
          effects:
            stability: 0.02
            history_flag: council_reform
        failure:
          text: >
            Your rhetoric sounds defensive, evasive. The dissident tears apart
            your logic publicly. Your credibility suffers.
          effects:
            chaos: 0.08
    - text: "Retreat to the cave."
      special: retreat

- id: the_traders
  conditions:
    tier: 3
    turn_min: 12
    required_milestones: [explored]
    blocked_by_milestones: [agora]
  text: >
    Travelers from the south have arrived, carrying goods unlike anything the
    settlement has seen — tools of fine craft, cloth of strange weave, spices.
    They want to trade for food and shelter. {npc} is excited: "Do we trade
    with them? How do we trust a stranger?"
  choices:
    - text: "Welcome the traders with open rhetoric."
      skill_check: rhetoric
      difficulty: 5
      outcomes:
        success:
          text: >
            You greet the traders warmly, negotiate generously. They are delighted.
            Trade is established. Within days, the settlement has resources it
            never imagined. Word spreads — merchants will come here.
          effects:
            food: 3
            knowledge: 1
          history_flag: first_trade
        failure:
          text: >
            Your welcome is too enthusiastic. The traders think you are desperate
            and demand outrageous terms. You agree just to get them to leave. Bad
            precedent is set.
          effects:
            food: 1
            stability: -0.02
    - text: "Approach with caution and wisdom — verify their claims first."
      skill_check: wisdom
      difficulty: 4
      outcomes:
        success:
          text: >
            You ask careful questions, verify their goods' quality, understand
            their business practices. You trade cautiously, small amounts. Trust
            builds slowly but solidly.
          effects:
            food: 2
            knowledge: 2
          history_flag: first_trade
        failure:
          text: >
            Your caution offends them. They feel distrusted and leave. Other
            settlements will welcome them. Opportunity lost.
          effects:
            knowledge: 1
            stability: -0.01
    - text: "Trade pragmatically — take what you need, negotiate hard."
      skill_check: pragmatism
      difficulty: 5
      outcomes:
        success:
          text: >
            You drive a shrewd bargain. The traders respect the toughness. They
            return with better goods the next season. Trade becomes regular,
            mutually beneficial.
          effects:
            food: 3
            knowledge: 1
          history_flag: first_trade
        failure:
          text: >
            You over-negotiate. The traders feel cheated and warn other merchants
            away. They do not return.
          effects:
            food: 2
            knowledge: 1
    - text: "Retreat to the cave."
      special: retreat

- id: the_children
  conditions:
    tier: 3
    turn_min: 13
    required_milestones: [first_night, sustenance]
  text: >
    {npc} tells you something is wrong with the children. They are not playing
    the way children should. Instead, they huddle together and reenact the cave
    — playing at searching, hiding, emerging. When asked, they speak of the
    darkness as a living thing. "The children are making it real again,"
    {npc} says. "What do we do?"
  choices:
    - text: "Rewrite the narrative with rhetoric and storytelling."
      skill_check: rhetoric
      difficulty: 5
      outcomes:
        success:
          text: >
            You gather the children and tell them a different story — one where
            the cave was a trial, a cocoon, a place of preparation. You speak of
            the emergence as triumph. They listen, rapt. The next day, their play
            changes — now they are explorers, builders, not refugees.
          effects:
            knowledge: 2
            stability: 0.04
          history_flag: cave_mythologized
        failure:
          text: >
            The children do not believe your story. It sounds like you are hiding
            something from them. Their imaginings grow darker.
          effects:
            chaos: 0.08
    - text: "Let them process the trauma with wisdom — acknowledge the fear."
      skill_check: wisdom
      difficulty: 4
      outcomes:
        success:
          text: >
            You speak with the children honestly: "The cave was scary. It was
            real. But you were brave, and now you are here." You listen to their
            fears, validate them. Slowly, they stop reenacting and start creating
            new stories.
          effects:
            knowledge: 1
            stability: 0.03
            population: 1
          history_flag: cave_mythologized
        failure:
          text: >
            The children sense your discomfort and clam up. They process alone,
            in their games. The mythology of the cave grows without your input.
          effects:
            stability: -0.01
    - text: "Address it with authority — teach them the real history."
      skill_check: authority
      difficulty: 4
      outcomes:
        success:
          text: >
            You gather the children formally and speak of the cave as history, not
            nightmare. "This is what happened. This is what we did. This is who
            you are." The past is integrated. The children move forward.
          effects:
            knowledge: 1
            stability: 0.04
          history_flag: cave_mythologized
        failure:
          text: >
            Your formal approach is too cold. The children feel lectured and
            dismissed. They return to their games even more intensely.
          effects:
            chaos: 0.06
    - text: "Retreat to the cave."
      special: retreat

- id: the_price_of_order
  conditions:
    tier: 3
    turn_min: 14
    chaos_min: 0.15
    required_milestones: [first_law]
    chaos_delta: 0.05
  text: >
    A law has been broken — someone stole food from the communal store. The
    council meets, and the verdict is swift: exile. But {npc} brings the case
    to you: "They were hungry. Their family was starving. The law says no, but
    justice says... what?"
  choices:
    - text: "Stand by the law with rhetoric — order requires consistency."
      skill_check: rhetoric
      difficulty: 6
      outcomes:
        success:
          text: >
            You argue eloquently that a law unenforced is no law at all. "If this
            theft goes unpunished, then theft is permitted. Then there is no order,
            only chaos." The exile stands. Order holds, hard and clear.
          effects:
            law: "Punishment is proportional to harm done"
            stability: 0.04
            population: -1
          history_flag: law_upheld
        failure:
          text: >
            Your rhetoric rings hollow. The person was hungry. Everyone knows it.
            Your defense of the law sounds like cruelty in a nice voice.
          effects:
            chaos: 0.1
            stability: -0.02
    - text: "Overrule the council with wisdom — mercy is also order."
      skill_check: wisdom
      difficulty: 7
      outcomes:
        success:
          text: >
            You intervene: "A law that cannot bend for hunger is a law written by
            the already-fed." You reduce the punishment to restitution. The person
            stays, works, repays. Justice is served without cruelty.
          effects:
            law: "Punishment is proportional to harm done"
            stability: 0.04
            knowledge: 1
          history_flag: law_upheld
        failure:
          text: >
            Your mercy is seen as weakness. The council resists, the settlement
            is split. The very law crumbles under challenge.
          effects:
            chaos: 0.12
            stability: -0.03
    - text: "Find a compromise with pragmatism — exile them but with resources."
      skill_check: pragmatism
      difficulty: 5
      outcomes:
        success:
          text: >
            You exile the person as the law demands, but you give them supplies
            and knowledge for survival. They leave with some dignity. The law is
            satisfied, and so is mercy.
          effects:
            law: "Punishment is proportional to harm done"
            stability: 0.02
            population: -1
          history_flag: law_upheld
        failure:
          text: >
            The exile resents the superficial mercy. They spread word of the
            settlement's coldness. Trust erodes both internally and externally.
          effects:
            chaos: 0.08
    - text: "Retreat to the cave."
      special: retreat

- id: the_memory_keeper
  conditions:
    tier: 3
    turn_min: 15
    blocked_by_milestones: [education]
  text: >
    {npc} has taken on a role no one assigned: keeper of stories. They sit by
    the fire each night and tell what they remember — the cave, the escape, the
    first season. But they are getting old, and the work is hard. They ask: "If
    I stop, will all of this be forgotten?"
  choices:
    - text: "Teach them with wisdom — find them an apprentice."
      skill_check: wisdom
      difficulty: 5
      outcomes:
        success:
          text: >
            You identify someone with a gift for memory and sit them together at
            the fire. The stories are passed down. The elder rests, knowing the
            work continues. A tradition is born.
          effects:
            knowledge: 2
            population: -1
          history_flag: oral_history_preserved
        failure:
          text: >
            The apprentice you choose is not interested. The elder's stories fade
            into silence. A world is lost.
          effects:
            knowledge: -1
            population: -1
    - text: "Organize formal storytelling with rhetoric and ceremony."
      skill_check: rhetoric
      difficulty: 4
      outcomes:
        success:
          text: >
            You establish a ceremony — the elder speaks, the settlement listens,
            together. The stories become collective property, not individual
            burden. The elder tells, lighter now.
          effects:
            knowledge: 1
            stability: 0.03
            population: -1
          history_flag: oral_history_preserved
        failure:
          text: >
            The ceremony feels performative, forced. The stories lose their
            intimacy. The elder withdraws, hurt.
          effects:
            knowledge: 1
            population: -1
    - text: "Retreat to the cave."
      special: retreat

- id: the_zealot
  conditions:
    tier: 3
    turn_min: 16
    chaos_min: 0.2
    min_population: 8
    chaos_delta: 0.1
  text: >
    A voice has emerged among the settlement — loud, charismatic, speaking of
    gods and spirits. They claim the cave was sacred, the darkness was divine,
    and emergence was a mistake. Followers gather. {npc} watches with concern:
    "They are sincere, but they are sowing doubt. What do we do with true belief
    we do not share?"
  choices:
    - text: "Debate them with rhetoric about reason and evidence."
      skill_check: rhetoric
      difficulty: 7
      outcomes:
        success:
          text: >
            You engage the zealot directly, respectfully, but firmly. You speak
            of what can be tested, what can be known. Some followers slip away.
            The zealot is diminished, but not destroyed. Reason survives.
          effects:
            chaos: -0.06
            knowledge: 1
          history_flag: superstition_defeated
        failure:
          text: >
            Your rhetoric is too abstract. The zealot counters with passion. You
            lose the crowd. More join them.
          effects:
            chaos: 0.15
    - text: "Suppress them with authority — no false prophets in this settlement."
      skill_check: authority
      difficulty: 7
      outcomes:
        success:
          text: >
            You exile the zealot. Their followers are scattered and shamed.
            Superstition is crushed. But something is also lost — people remember
            they are afraid of the darkness.
          effects:
            chaos: -0.04
            stability: 0.01
            population: -1
          history_flag: superstition_defeated
        failure:
          text: >
            The exile makes them a martyr. They return with followers, and their
            story is more powerful now — a prophet persecuted by the tyrant.
          effects:
            chaos: 0.2
    - text: "Channel their fervor with wisdom — turn belief toward the future."
      skill_check: wisdom
      difficulty: 6
      outcomes:
        success:
          text: >
            You speak with the zealot alone, listening. You find common ground —
            yes, the cave was profound; yes, emergence is sacred. But the sacred
            is in what you build now, together. They become a builder instead of
            a prophet.
          effects:
            chaos: -0.05
            knowledge: 1
            stability: 0.03
          history_flag: superstition_defeated
        failure:
          text: >
            Your attempt at synthesis is rejected. The zealot sees it as
            corruption. They harden and withdraw, taking followers with them.
          effects:
            chaos: 0.12
    - text: "Retreat to the cave."
      special: retreat

- id: the_spoken_law
  conditions:
    tier: 3
    turn_min: 17
    required_milestones: [council, first_law]
  text: >
    {npc} brings a proposal to the council: laws should be written, not just
    spoken. "If they are written, they cannot be twisted. They are real." But
    others resist — writing is sacred, difficult, and who decides what the law
    truly means once it is frozen in symbols?
  choices:
    - text: "Support the proposal with pragmatism — written law is clearer."
      skill_check: pragmatism
      difficulty: 5
      outcomes:
        success:
          text: >
            You organize the effort. Laws are carved into stone or written on
            hide. They are read aloud regularly. Suddenly, everyone knows what is
            forbidden and why. Justice becomes more consistent.
          effects:
            law: "The written law is the final authority"
            knowledge: 2
          history_flag: laws_written
        failure:
          text: >
            The writing effort is plagued with disputes. Who writes? What symbols?
            What if someone misreads? The project stalls.
          effects:
            stability: -0.02
    - text: "Argue for preserving oral tradition with wisdom."
      skill_check: wisdom
      difficulty: 6
      outcomes:
        success:
          text: >
            You argue that laws must live in memory, in interpretation, in the
            community's ongoing conversation. Writing freezes them, kills them.
            The council embraces this. Law becomes more fluid, more just.
          effects:
            knowledge: 1
            stability: 0.03
          history_flag: laws_written
        failure:
          text: >
            Your argument is heard as resistance to change. The council wants
            progress, not philosophical defense of the old way. You are sidelined.
          effects:
            stability: -0.02
    - text: "Propose a hybrid with rhetoric — write the law, but read it aloud."
      skill_check: rhetoric
      difficulty: 4
      outcomes:
        success:
          text: >
            You craft a compromise: laws are written for permanence, but read
            aloud regularly so they live in speech. Both camps accept this bridge.
            Law becomes solid yet living.
          effects:
            law: "The written law is the final authority"
            knowledge: 2
            stability: 0.03
          history_flag: laws_written
        failure:
          text: >
            The hybrid pleases no one. It is seen as half-measures. Both sides
            grow impatient with your moderation.
          effects:
            stability: -0.01
    - text: "Retreat to the cave."
      special: retreat
